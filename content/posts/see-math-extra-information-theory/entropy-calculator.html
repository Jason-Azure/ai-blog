<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>熵计算器</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0a0a1a;
  color: #e0e0e0;
  display: flex;
  justify-content: center;
  padding: 20px;
}
.container { max-width: 760px; width: 100%; }
h2 {
  text-align: center;
  font-size: 1.3em;
  margin-bottom: 6px;
  background: linear-gradient(135deg, #FF9800, #E91E63);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.subtitle { text-align: center; color: #888; font-size: 0.85em; margin-bottom: 24px; }

.demo {
  background: rgba(255,255,255,0.03);
  border-radius: 12px;
  padding: 24px;
  border: 1px solid rgba(255,255,255,0.08);
}

.slider-section { margin-bottom: 20px; }
.slider-label {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 8px; font-size: 0.9em;
}
.slider-label .val { color: #FF9800; font-weight: bold; font-size: 1.1em; }

input[type="range"] {
  -webkit-appearance: none; width: 100%; height: 6px;
  border-radius: 3px; background: #333; outline: none;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 20px; height: 20px;
  border-radius: 50%; background: #FF9800; cursor: pointer;
  box-shadow: 0 0 8px rgba(255,152,0,0.5);
}

.viz { display: flex; gap: 20px; margin-top: 20px; flex-wrap: wrap; }

.bar-section { flex: 1; min-width: 200px; }
.bar-section h3 { font-size: 0.9em; color: #888; margin-bottom: 10px; text-align: center; }

.bar-pair { display: flex; gap: 4px; height: 120px; align-items: flex-end; justify-content: center; }
.bar-wrapper { display: flex; flex-direction: column; align-items: center; width: 60px; }
.bar {
  width: 50px; border-radius: 4px 4px 0 0;
  transition: height 0.3s ease, background 0.3s ease;
  min-height: 2px;
}
.bar-a { background: linear-gradient(to top, #FF9800, #FFC107); }
.bar-b { background: linear-gradient(to top, #2196F3, #4FC3F7); }
.bar-text { font-size: 0.75em; margin-top: 4px; color: #aaa; }

.entropy-display {
  text-align: center; margin-top: 20px;
  padding: 16px; border-radius: 10px;
  background: rgba(233,30,99,0.08); border: 1px solid rgba(233,30,99,0.2);
  transition: all 0.3s;
}
.entropy-val { font-size: 2em; font-weight: bold; color: #E91E63; }
.entropy-unit { font-size: 0.9em; color: #888; }

.insight {
  margin-top: 16px; padding: 12px 16px; border-radius: 8px;
  background: rgba(255,152,0,0.08); border-left: 3px solid #FF9800;
  font-size: 0.85em; line-height: 1.6; color: #ccc;
  transition: all 0.3s;
}

.curve-section { flex: 1; min-width: 280px; }
canvas { width: 100%; height: 160px; border-radius: 8px; background: rgba(255,255,255,0.02); }
</style>
</head>
<body>
<div class="container">
  <h2>熵：不确定性的度量</h2>
  <p class="subtitle">一枚硬币，正面概率 P，反面概率 1−P。拖动滑块看熵如何变化。</p>

  <div class="demo">
    <div class="slider-section">
      <div class="slider-label">
        <span>P(正面)</span>
        <span class="val" id="pVal">0.50</span>
      </div>
      <input type="range" id="pSlider" min="0.01" max="0.99" step="0.01" value="0.50">
    </div>

    <div class="viz">
      <div class="bar-section">
        <h3>概率分布</h3>
        <div class="bar-pair">
          <div class="bar-wrapper">
            <div class="bar bar-a" id="barA" style="height: 60px;"></div>
            <div class="bar-text">正面 <span id="pA">50%</span></div>
          </div>
          <div class="bar-wrapper">
            <div class="bar bar-b" id="barB" style="height: 60px;"></div>
            <div class="bar-text">反面 <span id="pB">50%</span></div>
          </div>
        </div>
      </div>

      <div class="curve-section">
        <h3 style="font-size: 0.9em; color: #888; margin-bottom: 10px; text-align: center;">熵曲线 H(P)</h3>
        <canvas id="canvas" width="560" height="160"></canvas>
      </div>
    </div>

    <div class="entropy-display">
      <div class="entropy-val" id="entropyVal">1.000</div>
      <div class="entropy-unit">bit（熵）</div>
    </div>

    <div class="insight" id="insightText">
      P = 0.50：最大不确定性。你完全不知道会出现哪一面——需要整整 1 bit 来记录结果。这就是"一次抛硬币的信息量"。
    </div>
  </div>
</div>

<script>
const slider = document.getElementById('pSlider');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function entropy(p) {
  if (p <= 0.001 || p >= 0.999) return 0;
  const q = 1 - p;
  return -(p * Math.log2(p) + q * Math.log2(q));
}

function drawCurve(currentP) {
  const w = canvas.width, h = canvas.height;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = canvas.offsetWidth * dpr;
  canvas.height = 160 * dpr;
  ctx.scale(dpr, dpr);
  const cw = canvas.offsetWidth, ch = 160;

  ctx.clearRect(0, 0, cw, ch);
  const pad = { l: 35, r: 15, t: 10, b: 25 };
  const pw = cw - pad.l - pad.r, ph = ch - pad.t - pad.b;

  // Axes
  ctx.strokeStyle = '#444'; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(pad.l, pad.t); ctx.lineTo(pad.l, pad.t + ph); ctx.lineTo(pad.l + pw, pad.t + ph);
  ctx.stroke();

  // Labels
  ctx.fillStyle = '#666'; ctx.font = '11px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('0', pad.l, pad.t + ph + 16);
  ctx.fillText('0.5', pad.l + pw/2, pad.t + ph + 16);
  ctx.fillText('1', pad.l + pw, pad.t + ph + 16);
  ctx.textAlign = 'right';
  ctx.fillText('0', pad.l - 5, pad.t + ph + 4);
  ctx.fillText('1', pad.l - 5, pad.t + 12);

  // Curve
  ctx.beginPath();
  ctx.strokeStyle = '#E91E63'; ctx.lineWidth = 2;
  for (let i = 0; i <= 200; i++) {
    const p = i / 200;
    const x = pad.l + p * pw;
    const y = pad.t + ph - entropy(p) * ph;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.stroke();

  // Current point
  const cx = pad.l + currentP * pw;
  const cy = pad.t + ph - entropy(currentP) * ph;
  ctx.beginPath();
  ctx.arc(cx, cy, 6, 0, Math.PI * 2);
  ctx.fillStyle = '#FF9800';
  ctx.fill();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
  ctx.stroke();

  // Dashed lines
  ctx.setLineDash([4, 4]);
  ctx.strokeStyle = 'rgba(255,152,0,0.3)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx, pad.t + ph); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(pad.l, cy); ctx.stroke();
  ctx.setLineDash([]);
}

function update() {
  const p = parseFloat(slider.value);
  const q = 1 - p;
  const h = entropy(p);

  document.getElementById('pVal').textContent = p.toFixed(2);
  document.getElementById('pA').textContent = (p * 100).toFixed(0) + '%';
  document.getElementById('pB').textContent = (q * 100).toFixed(0) + '%';
  document.getElementById('barA').style.height = (p * 110 + 2) + 'px';
  document.getElementById('barB').style.height = (q * 110 + 2) + 'px';
  document.getElementById('entropyVal').textContent = h.toFixed(3);

  const ins = document.getElementById('insightText');
  if (p < 0.08 || p > 0.92) {
    ins.innerHTML = `<strong>P = ${p.toFixed(2)}</strong>：几乎确定。你已经知道结果了，所以"被告知结果"几乎不包含新信息。熵接近 0——不需要任何 bit 来记录。<br>这就是为什么"明天太阳会升起"的信息量约等于零。`;
  } else if (p < 0.25 || p > 0.75) {
    ins.innerHTML = `<strong>P = ${p.toFixed(2)}</strong>：不确定性较低。你大概猜得到结果，但偶尔会惊讶。平均需要 ${h.toFixed(2)} bit 来记录每次结果。<br>英语就像一枚不均匀的硬币——有模式可循，所以熵远低于最大值。`;
  } else if (Math.abs(p - 0.5) < 0.05) {
    ins.innerHTML = `<strong>P = ${p.toFixed(2)}</strong>：最大不确定性。你完全不知道会出现哪一面——需要整整 1 bit 来记录结果。<br>注意熵曲线在 P = 0.5 时到达顶峰。均匀分布 = 最不可预测 = 最不可压缩。`;
  } else {
    ins.innerHTML = `<strong>P = ${p.toFixed(2)}</strong>：中等不确定性。熵 = ${h.toFixed(3)} bit。有一定偏向，但不够确定。<br>Shannon 证明：这个数字就是你<strong>最少</strong>需要的平均 bit 数。不可能再少了。`;
  }

  drawCurve(p);
}

slider.addEventListener('input', update);
window.addEventListener('resize', update);
update();
</script>
</body>
</html>
